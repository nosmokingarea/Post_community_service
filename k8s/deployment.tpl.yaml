# k8s/deployment.tpl.yaml
# 설명: CodeBuild 단계에서 ${IMAGE_URI}로 치환되어 실제 deployment.yaml이 생성됩니다.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels: { app: myapp }
  template:
    metadata:
      labels: { app: myapp }
    spec:
      containers:
        - name: myapp
          image: ${IMAGE_URI}   # 예: 123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/myapp:abcd1234
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8080 }]