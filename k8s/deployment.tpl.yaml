apiVersion: apps/v1
kind: Deployment
metadata:
  name: post-service
  namespace: default
  labels:
    app: post-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: post-service
  template:
    metadata:
      labels:
        app: post-service
        version: v1
    spec:
      containers:
        - name: post-service
          image: ${IMAGE_URI}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: FLASK_APP
              value: "app"
            - name: FLASK_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: post-service-secrets
                  key: database-url
            - name: COGNITO_USER_POOL_ID
              valueFrom:
                secretKeyRef:
                  name: post-service-secrets
                  key: cognito-user-pool-id
            - name: COGNITO_REGION
              valueFrom:
                secretKeyRef:
                  name: post-service-secrets
                  key: cognito-region
            - name: COGNITO_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: post-service-secrets
                  key: cognito-client-id
            - name: AWS_S3_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: post-service-secrets
                  key: aws-s3-bucket-name
            - name: AWS_S3_REGION
              valueFrom:
                secretKeyRef:
                  name: post-service-secrets
                  key: aws-s3-region
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: post-service-secrets
                  key: secret-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: post-service
  namespace: default
  labels:
    app: post-service
spec:
  selector:
    app: post-service
  ports:
    - port: 80
      targetPort: 5000
      protocol: TCP
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: Secret
metadata:
  name: post-service-secrets
  namespace: default
type: Opaque
